<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>兔洞 · RabbitHole 发布页</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #fce4ec 0%, #f8d7e0 100%);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1.5rem;
            color: #3d1f2b;
            line-height: 1.5;
        }

        .release-card {
            max-width: 1100px;
            width: 100%;
            background: rgba(255, 245, 247, 0.78);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 52px;
            box-shadow: 0 30px 60px -20px rgba(120, 40, 60, 0.25), 0 6px 18px rgba(0, 0, 0, 0.04);
            padding: 2.8rem 2.8rem 2.2rem 2.8rem;
            border: 1px solid rgba(255, 220, 230, 0.6);
            transition: 0.2s;
            position: relative;
        }

        @media (max-width: 640px) {
            .release-card {
                padding: 1.8rem 1.2rem;
                border-radius: 32px;
            }
        }

        .app-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.8rem;
            margin-top: 0.2rem;
        }
        .app-brand {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .app-title {
            font-size: 2.4rem;
            font-weight: 650;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #5d2e3e, #b34a60);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .app-version {
            background: rgba(179, 74, 96, 0.12);
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #5d2e3e;
            border: 1px solid rgba(255, 200, 210, 0.4);
        }
        .platform-badge {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .badge {
            background: rgba(255, 215, 225, 0.4);
            backdrop-filter: blur(4px);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
            border: 1px solid rgba(255, 200, 210, 0.3);
            color: #5d2e3e;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .screenshot-section {
            margin: 1.8rem 0 2rem 0;
        }
        .screenshot-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }
        @media (max-width: 780px) {
            .screenshot-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 480px) {
            .screenshot-grid { grid-template-columns: 1fr; }
        }
        .screenshot-item {
            background: rgba(255, 240, 245, 0.8);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 8px 20px -8px rgba(120, 40, 60, 0.08), 0 0 0 1px rgba(255, 220, 230, 0.4);
            border: 1px solid rgba(255, 220, 230, 0.3);
            transition: 0.2s;
        }
        .screenshot-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 28px -14px rgba(120, 40, 60, 0.15);
        }
        .screenshot-placeholder {
            width: 100%;
            aspect-ratio: 16 / 10;
            background: #fce4ec;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #7a4a5a;
            font-size: 0.8rem;
            padding: 0.5rem;
            text-align: center;
            background-image: radial-gradient(circle at 20% 30%, rgba(255, 220, 230, 0.5) 0%, transparent 60%);
            position: relative;
            overflow: hidden;
        }
        .screenshot-placeholder img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }
        .screenshot-placeholder i {
            font-size: 2.4rem;
            color: #c98092;
            opacity: 0.6;
            z-index: 1;
        }
        .screenshot-label {
            padding: 0.6rem 1rem;
            background: rgba(255, 235, 240, 0.3);
            font-size: 0.75rem;
            font-weight: 500;
            color: #3d1f2b;
            display: flex;
            justify-content: center;
            border-top: 1px solid rgba(255, 220, 230, 0.3);
        }
        .screenshot-label span {
            background: #fce4ec;
            padding: 0.1rem 0.8rem;
            border-radius: 30px;
            font-size: 0.65rem;
            color: #7a4a5a;
        }
        .screenshot-tag {
            position: relative;
            z-index: 1;
            font-size: 0.7rem;
            background: rgba(255, 255, 255, 0.75);
            padding: 2px 14px;
            border-radius: 20px;
            color: #5d2e3e;
            backdrop-filter: blur(4px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-top: 6px;
        }

        .description-area {
            background: rgba(255, 235, 240, 0.3);
            backdrop-filter: blur(8px);
            padding: 1.6rem 2rem;
            border-radius: 32px;
            margin: 1.6rem 0 2rem 0;
            border: 1px solid rgba(255, 210, 220, 0.3);
        }
        .description-area p {
            font-size: 1rem;
            color: #3d1f2b;
            font-weight: 400;
            margin-bottom: 0.6rem;
            text-align: center;
        }
        .feature-list {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.5rem 1.8rem;
        }
        .feature-list li {
            list-style: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 450;
            color: #3d1f2b;
            font-size: 0.9rem;
        }
        .feature-list i {
            color: #b34a60;
            width: 1.2rem;
        }

        .cta-section {
            display: flex;
            flex-wrap: wrap;
            align-items: stretch;
            justify-content: center;
            gap: 1.2rem;
            margin: 0.5rem 0 0.8rem 0;
        }
        .download-group {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
        }
        .download-card {
            background: rgba(255, 240, 245, 0.5);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 1.2rem 1.8rem;
            border: 1px solid rgba(255, 210, 220, 0.3);
            min-width: 180px;
            flex: 1 0 auto;
            text-align: center;
            transition: 0.15s;
            box-shadow: 0 4px 12px -6px rgba(120, 40, 60, 0.08);
        }
        .download-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px -12px rgba(120, 40, 60, 0.15);
        }
        .download-card .download-btn {
            background: #b34a60;
            color: white;
            border: none;
            padding: 0.6rem 1.8rem;
            border-radius: 60px;
            font-weight: 550;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 18px -10px rgba(120, 40, 60, 0.25);
            transition: 0.15s;
            cursor: pointer;
            text-decoration: none;
            border: 1px solid rgba(255, 220, 230, 0.2);
        }
        .download-card .download-btn i { font-size: 1rem; }
        .download-card .download-btn:hover {
            background: #9e3d52;
            transform: scale(1.02);
        }
        .download-card .download-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: #5d2e3e;
            letter-spacing: 0.03em;
            margin-bottom: 6px;
        }
        .download-card .download-pwd {
            font-size: 0.75rem;
            color: #7a4a5a;
            margin-top: 8px;
            background: rgba(255, 215, 225, 0.3);
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            display: inline-block;
        }
        .download-card .download-pwd i {
            color: #b34a60;
            margin-right: 4px;
        }

        hr {
            border: none;
            border-top: 1px solid rgba(180, 80, 100, 0.1);
            margin: 2rem 0 1.2rem 0;
        }
        .footer-note {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.8rem;
            font-size: 0.8rem;
            color: #7a4a5a;
        }
        .footer-note i {
            color: #b34a60;
            margin-right: 4px;
        }
    </style>
</head>
<body>

</body>
</html>
